<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GYM Tracker Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080d;--bg2:#101018;--bg3:#181824;--bg4:#20202e;--bg5:#28283a;
  --accent:#7c6cf0;--accent-l:#b0a4ff;--accent-g:rgba(124,108,240,0.25);
  --green:#00c48c;--green-g:rgba(0,196,140,0.2);
  --red:#ff6b6b;--orange:#ffa726;--orange-g:rgba(255,167,38,0.15);
  --yellow:#ffee58;--cyan:#4dd0e1;
  --text:#eef0f8;--text2:#9090a8;--text3:#505068;
  --border:#2a2a3e;--r:16px;--rs:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;padding-bottom:84px;}

/* ═══ HEADER ═══ */
.header{position:sticky;top:0;z-index:50;background:rgba(8,8,13,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-left h1{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--accent-l),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-sub{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.workout-timer{color:var(--green);font-weight:700;font-variant-numeric:tabular-nums;}
.streak-badge{background:linear-gradient(135deg,#ff6b35,#ff9800);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:3px;}
.header-right{display:flex;gap:6px;align-items:center;}
.hdr-btn{background:var(--bg3);border:1.5px solid var(--border);color:var(--text2);font-size:11px;font-weight:700;padding:7px 10px;border-radius:20px;cursor:pointer;transition:all .25s;white-space:nowrap;font-family:inherit;}
.hdr-btn.active{border-color:var(--orange);color:var(--orange);background:var(--orange-g);}
.hdr-btn svg{width:16px;height:16px;vertical-align:middle;}

/* ═══ TABS ═══ */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:rgba(16,16,24,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;transition:color .2s;font-family:inherit;}
.tab-btn.active{color:var(--accent-l);}
.tab-btn svg{width:22px;height:22px;}

.tab-content{display:none;padding:14px 16px;}
.tab-content.active{display:block;}

/* ═══ BODY WEIGHT ═══ */
.bw-card{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;margin-bottom:14px;}
.bw-card .bw-icon{font-size:18px;flex-shrink:0;}
.bw-card input{width:80px;background:var(--bg4);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:16px;font-weight:700;padding:6px 8px;text-align:center;outline:none;}
.bw-card input:focus{border-color:var(--accent);}
.bw-unit{font-size:13px;color:var(--text3);font-weight:600;}
.bw-save{background:var(--green);border:none;color:#000;font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit;transition:transform .15s;}
.bw-save:active{transform:scale(0.93);}
.bw-delta{font-size:12px;font-weight:700;margin-left:auto;white-space:nowrap;}
.bw-delta.up{color:var(--red);}
.bw-delta.down{color:var(--green);}
.bw-hist-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;}

/* ═══ TEMPLATE SELECTOR ═══ */
.tmpl-sel{display:flex;gap:10px;margin-bottom:16px;}
.tmpl-btn{flex:1;padding:14px;border-radius:var(--r);background:var(--bg3);border:2px solid var(--border);color:var(--text2);font-weight:700;font-size:16px;cursor:pointer;transition:all .25s;text-align:center;font-family:inherit;}
.tmpl-btn.active{border-color:var(--accent);background:linear-gradient(135deg,rgba(124,108,240,0.15),rgba(124,108,240,0.05));color:var(--accent-l);box-shadow:0 0 20px var(--accent-g);}

/* ═══ EXERCISE CARD ═══ */
.ex-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;transition:all .3s;position:relative;}
.ex-card.myo{border-color:var(--green);box-shadow:0 0 16px var(--green-g);}
.ex-card.editing{border-color:var(--orange);box-shadow:0 0 12px var(--orange-g);}
.ex-card.has-pr{border-color:var(--yellow);box-shadow:0 0 16px rgba(255,238,88,0.2);}

.ex-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;}
.ex-hdr-left{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:700;line-height:1.3;word-break:break-word;}
.ex-name.editable{cursor:pointer;border-bottom:1.5px dashed var(--orange);padding-bottom:2px;}
.ex-muscle{font-size:11px;color:var(--text3);font-weight:500;margin-top:2px;}
.ex-muscle.editable{cursor:pointer;border-bottom:1px dashed rgba(255,167,38,0.4);}
.ex-badges{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.badge-myo{background:var(--green);color:#000;}
.badge-pr{background:var(--yellow);color:#000;animation:prPulse 1s ease infinite;}
@keyframes prPulse{0%,100%{opacity:1}50%{opacity:0.7}}

.ex-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.ex-act-btn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;border:none;}
.ex-act-btn:active{transform:scale(0.9);}
.ex-act-btn.del{background:rgba(255,107,107,0.12);border:1.5px solid rgba(255,107,107,0.3);}
.ex-act-btn.del svg{color:var(--red);}
.ex-act-btn.move{background:var(--bg4);border:1.5px solid var(--border);}
.ex-act-btn.move svg{color:var(--text3);}

.ex-last{font-size:11px;color:var(--text3);margin-bottom:10px;padding:8px 10px;background:var(--bg4);border-radius:var(--rs);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;line-height:1.4;}
.ex-last:active{background:var(--bg5);color:var(--text2);}

.myo-tog{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;background:var(--bg4);border-radius:var(--rs);cursor:pointer;user-select:none;}
.myo-tog input{display:none;}
.myo-sw{width:38px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .25s;flex-shrink:0;}
.myo-sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .25s;}
.myo-tog input:checked~.myo-sw{background:var(--green);}
.myo-tog input:checked~.myo-sw::after{transform:translateX(18px);}
.myo-lbl{font-size:12px;color:var(--text2);font-weight:600;}

.notes-toggle{font-size:11px;color:var(--text3);cursor:pointer;margin-bottom:8px;font-weight:600;user-select:none;padding:4px 0;}
.notes-area textarea{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:inherit;font-size:13px;padding:10px;resize:vertical;min-height:50px;outline:none;margin-bottom:10px;}
.notes-area textarea:focus{border-color:var(--accent);}

/* ═══ SET ROWS ═══ */
.sets-wrap{display:flex;flex-direction:column;gap:8px;}
.set-row{display:flex;align-items:center;gap:6px;}
.set-num{width:26px;height:26px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);flex-shrink:0;cursor:pointer;transition:all .2s;border:1.5px solid transparent;position:relative;}
.set-num.warmup{background:rgba(255,167,38,0.15);border-color:var(--orange);color:var(--orange);}
.set-num.drop{background:rgba(255,107,107,0.12);border-color:var(--red);color:var(--red);}
.set-type-tip{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:8px;background:var(--bg5);color:var(--text2);padding:2px 6px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;}
.set-num:active .set-type-tip{opacity:1;}

.inp-grp{flex:1;display:flex;gap:6px;}
.inp-w{flex:1;position:relative;}
.inp-w>label{position:absolute;top:4px;left:10px;font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;pointer-events:none;z-index:1;}
.inp-w input{width:100%;background:var(--bg4);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:inherit;font-size:20px;font-weight:700;padding:18px 10px 6px;text-align:center;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp-w input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);}
.inp-w input::placeholder{color:var(--text3);font-size:13px;font-weight:500;}
.w-adj{display:flex;justify-content:center;gap:4px;margin-top:3px;}
.w-adj button{background:var(--bg5);border:none;color:var(--text3);font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px;cursor:pointer;transition:all .15s;font-family:inherit;}
.w-adj button:active{transform:scale(0.9);background:var(--accent);color:#fff;}

@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.set-done{width:36px;height:36px;border-radius:50%;background:var(--bg4);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;flex-shrink:0;}
.set-done.checked{background:var(--green);border-color:var(--green);animation:pop .3s ease;}
.set-done svg{width:18px;height:18px;color:var(--text3);}
.set-done.checked svg{color:#000;}

.del-set{width:26px;height:26px;border-radius:50%;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0.35;transition:opacity .2s;flex-shrink:0;}
.del-set:hover,.del-set:active{opacity:1;}
.del-set svg{width:13px;height:13px;color:var(--red);}

.add-set{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;margin-top:8px;background:none;border:1.5px dashed var(--border);border-radius:var(--rs);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.add-set:hover{border-color:var(--accent);color:var(--accent-l);}

/* ═══ SUMMARY ═══ */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.summary-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:14px 10px;text-align:center;}
.summary-val{font-size:22px;font-weight:800;color:var(--accent-l);}
.summary-lbl{font-size:10px;color:var(--text3);font-weight:600;margin-top:4px;text-transform:uppercase;}
.summary-cmp{font-size:10px;font-weight:700;margin-top:2px;}
.summary-cmp.up{color:var(--green);}
.summary-cmp.down{color:var(--red);}

/* ═══ BUTTONS ═══ */
.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;background:var(--bg3);border:2px dashed var(--border);border-radius:var(--r);color:var(--text3);font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;margin-bottom:14px;font-family:inherit;}
.add-ex-btn:hover{border-color:var(--accent);color:var(--accent-l);}
.save-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#5a4bd1);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .3s;box-shadow:0 4px 24px var(--accent-g);font-family:inherit;}
.save-btn:active{transform:scale(0.97);}
.reset-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;margin-bottom:14px;background:none;border:1.5px solid rgba(255,107,107,0.25);border-radius:var(--rs);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;opacity:0.7;transition:all .2s;font-family:inherit;}
.reset-btn:hover{opacity:1;}

/* ═══ REST TIMER — FIXED ABOVE TAB BAR ═══ */
.rest-bar{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom,0px) + 10px);left:10px;right:10px;z-index:60;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transform:translateY(200%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 30px rgba(0,0,0,0.6);}
.rest-bar.show{transform:translateY(0);}
.rest-bar.done{border-color:var(--green);}
.rest-progress{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--accent-g),rgba(124,108,240,0.06));transition:width .95s linear;z-index:0;}
.rest-bar.done .rest-progress{background:linear-gradient(90deg,var(--green-g),rgba(0,196,140,0.05));}
.rest-content{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.rest-left{display:flex;align-items:center;gap:10px;}
.rest-icon{font-size:20px;}
.rest-time{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;}
.rest-bar.done .rest-time{color:var(--green);}
.rest-right{display:flex;gap:8px;}
.rest-btn{background:var(--bg5);border:none;color:var(--text2);font-size:12px;font-weight:700;padding:8px 14px;border-radius:20px;cursor:pointer;font-family:inherit;transition:all .2s;}
.rest-btn:active{transform:scale(0.93);}
.rest-btn.skip{background:rgba(255,107,107,0.15);color:var(--red);}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:24px 20px;width:100%;max-width:400px;transform:translateY(20px) scale(0.96);transition:transform .25s;max-height:85vh;overflow-y:auto;}
.modal-overlay.show .modal{transform:translateY(0) scale(1);}
.modal h3{font-size:17px;font-weight:800;margin-bottom:16px;}
.m-field{margin-bottom:14px;}
.m-field>label{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.m-field input,.m-field select{width:100%;padding:14px;background:var(--bg4);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:inherit;font-size:16px;font-weight:600;outline:none;transition:border-color .2s;}
.m-field input:focus,.m-field select:focus{border-color:var(--accent);}
.m-field input::placeholder{color:var(--text3);}
.m-actions{display:flex;gap:10px;margin-top:20px;}
.m-actions button{flex:1;padding:14px;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;border:none;transition:transform .15s;font-family:inherit;}
.m-actions button:active{transform:scale(0.96);}
.m-cancel{background:var(--bg4);color:var(--text2);}
.m-confirm{background:var(--accent);color:#fff;}
.m-danger{background:var(--red)!important;color:#fff!important;}

/* ═══ SETTINGS ═══ */
.settings-group{margin-bottom:18px;}
.settings-group-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;}
.settings-option{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.settings-option:last-child{border-bottom:none;}
.settings-option span{font-size:14px;font-weight:600;color:var(--text);}
.rest-presets{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.rest-preset{padding:8px 16px;border-radius:20px;background:var(--bg4);border:1.5px solid var(--border);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.rest-preset.active{border-color:var(--accent);color:var(--accent-l);background:var(--accent-g);}

/* ═══ PLATE CALCULATOR ═══ */
.plate-result{margin-top:16px;}
.plate-side{font-size:13px;color:var(--text2);font-weight:600;margin-bottom:10px;}
.plate-visual{display:flex;align-items:center;justify-content:center;gap:3px;padding:16px 0;flex-wrap:wrap;}
.plate-disc{display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:10px;font-weight:800;color:#000;min-width:28px;text-align:center;padding:2px 4px;}
.plate-disc.p25{background:#e53935;height:56px;}
.plate-disc.p20{background:#1e88e5;height:50px;}
.plate-disc.p15{background:#fdd835;height:44px;}
.plate-disc.p10{background:#43a047;height:38px;}
.plate-disc.p5{background:#fff;height:32px;}
.plate-disc.p2_5{background:#e53935;height:26px;font-size:9px;}
.plate-disc.p1_25{background:#9e9e9e;height:22px;font-size:8px;}
.plate-bar{width:120px;height:12px;background:linear-gradient(90deg,#666,#888,#666);border-radius:6px;}
.plate-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.plate-item{background:var(--bg4);padding:6px 12px;border-radius:8px;font-size:13px;font-weight:700;color:var(--text);}

/* ═══ HISTORY ═══ */
.hist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.hist-title{font-size:18px;font-weight:700;}
.hist-actions{display:flex;gap:8px;flex-wrap:wrap;}
.hist-btn{background:var(--bg3);border:1px solid var(--border);font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .2s;}
.hist-btn.red{color:var(--red);}
.hist-btn.blue{color:var(--accent-l);}
.hist-btn.green{color:var(--green);}

.week-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.week-stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px 8px;text-align:center;}
.week-stat-val{font-size:20px;font-weight:800;color:var(--cyan);}
.week-stat-lbl{font-size:9px;color:var(--text3);font-weight:600;margin-top:3px;text-transform:uppercase;}

.hist-group{margin-bottom:18px;}
.hist-date{font-size:13px;font-weight:700;color:var(--accent-l);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hist-tag{font-size:10px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-weight:700;}
.hist-dur{font-size:10px;color:var(--text3);font-weight:600;}
.hist-bw{font-size:10px;color:var(--cyan);font-weight:600;}
.hist-del-btn{margin-left:auto;background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;opacity:0.5;transition:opacity .2s;padding:4px;}
.hist-del-btn:hover,.hist-del-btn:active{opacity:1;}
.hist-ex{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;}
.hist-ex-name{font-size:14px;font-weight:700;margin-bottom:6px;}
.hist-sets{display:flex;flex-wrap:wrap;gap:6px;}
.hist-set{background:var(--bg4);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;color:var(--text2);}
.hist-set .w{color:var(--accent-l);}
.hist-set .r{color:var(--green);}

/* ═══ PROGRESS ═══ */
.prog-select{width:100%;padding:14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;font-weight:600;font-family:inherit;margin-bottom:16px;outline:none;appearance:none;cursor:pointer;}
.prog-select option{background:var(--bg3);}
.prog-1rm{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:16px;}
.prog-1rm-val{font-size:36px;font-weight:900;color:var(--accent-l);}
.prog-1rm-lbl{font-size:12px;color:var(--text3);margin-top:4px;text-transform:uppercase;font-weight:600;}
.prog-chart{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;min-height:220px;margin-bottom:16px;}
.chart-canvas{width:100%;height:200px;}
.prog-table{width:100%;margin-bottom:20px;border-collapse:collapse;}
.prog-table th{text-align:left;font-size:10px;font-weight:700;color:var(--text3);padding:8px 4px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);}
.prog-table td{padding:9px 4px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid rgba(42,42,58,0.4);}
.prog-table td:first-child{color:var(--text);}
.trend-up{color:var(--green)!important;}
.trend-down{color:var(--red)!important;}

/* ═══ PR BOARD ═══ */
.pr-board{margin-top:10px;}
.pr-board-title{font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pr-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:14px;text-align:center;transition:all .2s;}
.pr-card.recent{border-color:var(--yellow);box-shadow:0 0 12px rgba(255,238,88,0.15);}
.pr-card-name{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-card-val{font-size:22px;font-weight:900;color:var(--yellow);}
.pr-card-sub{font-size:10px;color:var(--text3);margin-top:3px;}

.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:0.3;}
.empty p{font-size:14px;font-weight:500;line-height:1.5;}

/* ═══ TOAST & CONFETTI ═══ */
.toast{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0px) + 10px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;font-weight:700;font-size:14px;padding:12px 24px;border-radius:30px;opacity:0;pointer-events:none;transition:all .35s;z-index:999;box-shadow:0 4px 20px var(--green-g);white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#confettiCanvas{position:fixed;inset:0;z-index:9999;pointer-events:none;display:none;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(min-width:480px){.tab-content{max-width:460px;margin:0 auto;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>💪 GYM TRACKER</h1>
    <div class="header-sub">
      <span id="todayDate"></span>
      <span id="streakBadge" class="streak-badge" style="display:none">🔥 <span id="streakVal">0</span></span>
      <span id="workoutTimer" class="workout-timer" style="display:none">⏱ <span id="wtText">00:00</span></span>
    </div>
  </div>
  <div class="header-right">
    <button class="hdr-btn" onclick="openPlateCalc()" title="Калькулятор блинов">🔢</button>
    <button class="hdr-btn" onclick="openSettings()">⚙️</button>
    <button class="hdr-btn" id="editBtn" onclick="toggleEdit()">✏️</button>
  </div>
</div>

<div class="tab-content active" id="tabWorkout">
  <div class="bw-card">
    <span class="bw-icon">⚖️</span>
    <input type="number" inputmode="decimal" step="0.1" id="bwInput" placeholder="Вес">
    <span class="bw-unit">кг</span>
    <button class="bw-save" onclick="saveBW()">💾</button>
    <span class="bw-delta" id="bwDelta"></span>
    <button class="bw-hist-btn" onclick="openBWHistory()" title="История веса">📈</button>
  </div>

  <div class="tmpl-sel">
    <button class="tmpl-btn active" data-t="A" onclick="selTmpl('A')">Шаблон А</button>
    <button class="tmpl-btn" data-t="B" onclick="selTmpl('B')">Шаблон Б</button>
  </div>
  <div id="editControls" style="display:none">
    <button class="reset-btn" onclick="resetTmpl()">🔄 Сбросить шаблон к стандартному</button>
  </div>
  <div id="exList"></div>
  <div id="addExArea" style="display:none">
    <button class="add-ex-btn" onclick="openAddExModal()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Добавить упражнение
    </button>
  </div>
  <div class="summary" id="summaryCard">
    <div class="summary-item">
      <div class="summary-val" id="sVol">0</div>
      <div class="summary-lbl">Объём кг</div>
      <div class="summary-cmp" id="sVolCmp"></div>
    </div>
    <div class="summary-item">
      <div class="summary-val" id="sSets">0/0</div>
      <div class="summary-lbl">Подходов ✓</div>
    </div>
    <div class="summary-item">
      <div class="summary-val" id="sExs">0/0</div>
      <div class="summary-lbl">Упражнений</div>
    </div>
  </div>
  <button class="save-btn" onclick="saveWorkout()">💾 Сохранить тренировку</button>
</div>

<div class="tab-content" id="tabHistory">
  <div class="hist-hdr">
    <div class="hist-title">📋 История</div>
    <div class="hist-actions">
      <button class="hist-btn green" onclick="importData()">📥 Импорт</button>
      <button class="hist-btn blue" onclick="exportData()">📤 Экспорт</button>
      <button class="hist-btn red" onclick="clearHistory()">🗑</button>
    </div>
  </div>
  <div class="week-summary" id="weekSummary"></div>
  <div id="histList"></div>
</div>

<div class="tab-content" id="tabProgress">
  <h3 style="font-size:18px;font-weight:700;margin-bottom:14px;">📈 Прогресс</h3>
  <select class="prog-select" id="progSelect" onchange="renderProgress()"><option value="">— Выберите упражнение —</option></select>
  <div class="prog-1rm" id="prog1rm" style="display:none">
    <div class="prog-1rm-val" id="val1rm">0 кг</div>
    <div class="prog-1rm-lbl">Расчётный 1RM (Epley)</div>
  </div>
  <div class="prog-chart"><canvas class="chart-canvas" id="chartCanvas"></canvas></div>
  <table class="prog-table" id="progTable">
    <thead><tr><th>Дата</th><th>Макс</th><th>Повт.</th><th>Объём</th><th>1RM</th></tr></thead>
    <tbody id="progBody"></tbody>
  </table>
  <div class="pr-board" id="prBoard"></div>
</div>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('tabWorkout',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
    Тренировка
  </button>
  <button class="tab-btn" onclick="switchTab('tabHistory',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
    История
  </button>
  <button class="tab-btn" onclick="switchTab('tabProgress',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Прогресс
  </button>
</nav>

<div class="rest-bar" id="restBar">
  <div class="rest-progress" id="restProgress"></div>
  <div class="rest-content">
    <div class="rest-left">
      <span class="rest-icon">⏱</span>
      <span class="rest-time" id="restTime">1:30</span>
    </div>
    <div class="rest-right">
      <button class="rest-btn" onclick="addRest(-15)">−15</button>
      <button class="rest-btn" onclick="addRest(30)">+30</button>
      <button class="rest-btn skip" onclick="skipRest()">✕</button>
    </div>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modOv" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modBox"></div>
</div>

<script>
/* ═══════════════════════════════════════
   DEFAULTS
   ═══════════════════════════════════════ */
const DEFAULTS={
  A:[
    {name:'Приседания со штангой',muscle:'Квадрицепс',sets:4},
    {name:'Румынская тяга',muscle:'Задняя поверхность',sets:3},
    {name:'Жим лёжа',muscle:'Грудные',sets:4},
    {name:'Тяга штанги в наклоне',muscle:'Спина',sets:4},
    {name:'Жим гантелей сидя',muscle:'Дельты',sets:3},
    {name:'Сгибания на бицепс',muscle:'Бицепс',sets:3},
  ],
  B:[
    {name:'Становая тяга',muscle:'Спина / Ноги',sets:4},
    {name:'Болгарские сплит-приседы',muscle:'Квадрицепс',sets:3},
    {name:'Жим на наклонной',muscle:'Верх грудных',sets:4},
    {name:'Подтягивания',muscle:'Широчайшие',sets:4},
    {name:'Разведения гантелей',muscle:'Задние дельты',sets:3},
    {name:'Французский жим',muscle:'Трицепс',sets:3},
  ]
};

let curT='A', ws={}, editMode=false;
let restInt=null, restRemain=0, restTotal=0;
let wtStart=null, wtInt=null;

/* ═══ SETTINGS ═══ */
function getS(){const s=localStorage.getItem('gymSettings');return s?JSON.parse(s):{restDuration:90,autoRest:true,sound:true,vibrate:true,barWeight:20};}
function putS(s){localStorage.setItem('gymSettings',JSON.stringify(s));}

/* ═══ TEMPLATES ═══ */
function getT(){const s=localStorage.getItem('customTemplates');return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULTS));}
function putT(t){localStorage.setItem('customTemplates',JSON.stringify(t));}

/* ═══ BODY WEIGHT ═══ */
function getBWLog(){return JSON.parse(localStorage.getItem('bodyWeightLog')||'[]');}
function putBWLog(l){localStorage.setItem('bodyWeightLog',JSON.stringify(l));}

function initBW(){
  const log=getBWLog();
  if(log.length){
    const last=log[log.length-1];
    document.getElementById('bwInput').value=last.weight;
    if(log.length>1){
      const prev=log[log.length-2];
      const diff=(last.weight-prev.weight).toFixed(1);
      const el=document.getElementById('bwDelta');
      if(diff>0){el.textContent='↑+'+diff;el.className='bw-delta up';}
      else if(diff<0){el.textContent='↓'+diff;el.className='bw-delta down';}
      else{el.textContent='→0';el.className='bw-delta';}
    }
  }
}

function saveBW(){
  const v=parseFloat(document.getElementById('bwInput').value);
  if(!v||v<=0)return;
  const log=getBWLog();
  const today=new Date().toISOString().slice(0,10);
  const existing=log.findIndex(e=>e.date===today);
  if(existing>=0)log[existing].weight=v;
  else log.push({date:today,weight:v});
  putBWLog(log);
  initBW();
  showToast('⚖️ Вес сохранён');
}

function openBWHistory(){
  const log=getBWLog();
  if(!log.length){openModal('<h3>⚖️ История веса</h3><p style="color:var(--text3)">Пока нет записей</p><div class="m-actions"><button class="m-confirm" onclick="closeModal()">ОК</button></div>');return;}
  let rows='';
  const rev=[...log].reverse().slice(0,30);
  rev.forEach((e,i)=>{
    const d=new Date(e.date).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
    let delta='';
    if(i<rev.length-1){
      const diff=(e.weight-rev[i+1].weight).toFixed(1);
      if(diff>0)delta=`<span style="color:var(--red)">↑+${diff}</span>`;
      else if(diff<0)delta=`<span style="color:var(--green)">↓${diff}</span>`;
    }
    rows+=`<tr><td>${d}</td><td style="font-weight:800">${e.weight} кг</td><td>${delta}</td></tr>`;
  });
  openModal(`<h3>⚖️ История веса тела</h3>
    <table class="prog-table"><thead><tr><th>Дата</th><th>Вес</th><th>Δ</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div class="m-actions"><button class="m-confirm" onclick="closeModal()">Закрыть</button></div>`);
}

/* ═══ STREAK ═══ */
function calcStreak(){
  const h=JSON.parse(localStorage.getItem('workoutHistory')||'[]');
  if(!h.length)return 0;
  const days=new Set();
  h.forEach(w=>{const d=new Date(w.date);days.add(d.toDateString());});
  let streak=0,check=new Date();check.setHours(0,0,0,0);
  if(!days.has(check.toDateString()))check.setDate(check.getDate()-1);
  while(days.has(check.toDateString())){streak++;check.setDate(check.getDate()-1);}
  return streak;
}

function updateStreak(){
  const s=calcStreak();
  const el=document.getElementById('streakBadge');
  if(s>0){el.style.display='inline-flex';document.getElementById('streakVal').textContent=s;}
  else el.style.display='none';
}

/* ═══ INIT ═══ */
function init(){
  const d=new Date();
  document.getElementById('todayDate').textContent=d.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  loadWS();renderExs();initBW();updateStreak();
}

function selTmpl(t){
  curT=t;
  document.querySelectorAll('.tmpl-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  loadWS();renderExs();
}

function loadWS(){
  const saved=localStorage.getItem('draft_'+curT);
  if(saved){ws=JSON.parse(saved);}else{rebuildWS();}
}

function rebuildWS(){
  ws={};
  getT()[curT].forEach((ex,i)=>{
    const sets=[];for(let s=0;s<ex.sets;s++)sets.push({weight:'',reps:'',done:false,type:'work'});
    ws[i]={sets,myo:false,notes:''};
  });
}

function saveDraft(){localStorage.setItem('draft_'+curT,JSON.stringify(ws));}

/* ═══ EDIT MODE ═══ */
function toggleEdit(){
  editMode=!editMode;
  const btn=document.getElementById('editBtn');
  btn.classList.toggle('active',editMode);
  btn.textContent=editMode?'✅':'✏️';
  document.getElementById('editControls').style.display=editMode?'block':'none';
  document.getElementById('addExArea').style.display=editMode?'block':'none';
  renderExs();
}

/* ═══ PREVIOUS WORKOUT ═══ */
function getLastData(name){
  const h=JSON.parse(localStorage.getItem('workoutHistory')||'[]');
  for(const w of h)for(const e of w.exercises)if(e.name===name)return e;
  return null;
}

/* ═══ PR DETECTION ═══ */
function checkPR(name,curMax){
  if(curMax<=0)return false;
  const h=JSON.parse(localStorage.getItem('workoutHistory')||'[]');
  let hMax=0;
  h.forEach(w=>w.exercises.forEach(e=>{if(e.name===name)e.sets.forEach(s=>{const v=parseFloat(s.weight)||0;if(v>hMax)hMax=v;});}));
  return curMax>hMax&&hMax>0;
}

/* ═══ VOLUME COMPARISON ═══ */
function getLastVolume(){
  const h=JSON.parse(localStorage.getItem('workoutHistory')||'[]');
  for(const w of h){
    if(w.template===curT){
      let vol=0;
      w.exercises.forEach(e=>e.sets.forEach(s=>{vol+=(parseFloat(s.weight)||0)*parseTR(s.reps);}));
      return vol;
    }
  }
  return null;
}

/* ═══ RENDER EXERCISES ═══ */
function renderExs(){
  const list=document.getElementById('exList');
  const tmpls=getT();
  const exs=tmpls[curT];

  exs.forEach((ex,i)=>{
    if(!ws[i]){const sets=[];for(let s=0;s<ex.sets;s++)sets.push({weight:'',reps:'',done:false,type:'work'});ws[i]={sets,myo:false,notes:''};}
    if(ws[i].notes===undefined)ws[i].notes='';
    ws[i].sets.forEach(s=>{if(!s.type)s.type='work';});
  });
  Object.keys(ws).forEach(k=>{if(+k>=exs.length)delete ws[k];});

  let html='';
  exs.forEach((ex,ei)=>{
    const st=ws[ei],isMyo=st.myo;
    let curMax=0;
    st.sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>curMax)curMax=w;});
    const hasPR=!editMode&&checkPR(ex.name,curMax);

    let cls='ex-card';
    if(editMode)cls+=' editing';
    else if(hasPR)cls+=' has-pr';
    else if(isMyo)cls+=' myo';

    html+=`<div class="${cls}">`;

    // Header
    html+=`<div class="ex-hdr"><div class="ex-hdr-left">`;
    html+=`<div class="ex-name${editMode?' editable':''}" ${editMode?`onclick="editName(${ei})"`:''}>${esc(ex.name)}</div>`;
    html+=`<div class="ex-muscle${editMode?' editable':''}" ${editMode?`onclick="editMuscle(${ei})"`:''}>${esc(ex.muscle)}</div>`;
    html+=`</div><div class="ex-badges">`;
    if(isMyo&&!editMode)html+=`<span class="badge badge-myo">MYO</span>`;
    if(hasPR)html+=`<span class="badge badge-pr">🏆 PR!</span>`;
    html+=`</div>`;

    if(editMode){
      html+=`<div class="ex-actions">`;
      if(ei>0)html+=`<button class="ex-act-btn move" onclick="moveEx(${ei},-1)"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg></button>`;
      if(ei<exs.length-1)html+=`<button class="ex-act-btn move" onclick="moveEx(${ei},1)"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>`;
      html+=`<button class="ex-act-btn del" onclick="delEx(${ei})"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>`;
      html+=`</div>`;
    }
    html+=`</div>`;

    if(!editMode){
      // Last workout
      const last=getLastData(ex.name);
      if(last){
        const parts=last.sets.map(s=>`${s.weight||0}×${s.reps||0}`).join(', ');
        html+=`<div class="ex-last" onclick="fillLast(${ei})">📋 Прошлый: ${esc(parts)} — нажми заполнить</div>`;
      }
      // Myo toggle
      html+=`<label class="myo-tog"><span class="myo-lbl">Myo-reps режим</span><input type="checkbox" ${isMyo?'checked':''} onchange="togMyo(${ei},this.checked)"><div class="myo-sw"></div></label>`;
      // Notes
      const hasNotes=st.notes&&st.notes.length>0;
      html+=`<div class="notes-toggle" onclick="togNotes(${ei})">📝 Заметки${hasNotes?' (есть)':''} ▾</div>`;
      html+=`<div class="notes-area" id="notesArea${ei}" style="display:none"><textarea placeholder="Заметки к упражнению..." onchange="updNotes(${ei},this.value)">${esc(st.notes||'')}</textarea></div>`;
      // Sets
      html+=`<div class="sets-wrap">`;
      st.sets.forEach((set,si)=>{html+=buildSet(ei,si,set,isMyo);});
      html+=`</div>`;
      html+=`<button class="add-set" onclick="addSet(${ei})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Добавить подход</button>`;
    }
    html+=`</div>`;
  });

  list.innerHTML=html;
  updateSummary();
}

function buildSet(ei,si,set,isMyo){
  const rPh=isMyo?'15+3+3':'0';
  const rLbl=isMyo?'Myo':'Повтор.';
  const typeClass=set.type==='warmup'?' warmup':set.type==='drop'?' drop':'';
  const typeLabel=set.type==='warmup'?'Р':set.type==='drop'?'Д':(si+1);
  let h=`<div class="set-row">`;
  h+=`<div class="set-num${typeClass}" onclick="cycleType(${ei},${si})" title="Тип подхода: тап для смены"><span class="set-type-tip">${set.type==='warmup'?'Разминка':set.type==='drop'?'Дроп-сет':'Рабочий'}</span>${typeLabel}</div>`;
  h+=`<div class="inp-grp">`;
  h+=`<div class="inp-w"><label>Вес (кг)</label>`;
  h+=`<input type="number" inputmode="decimal" placeholder="0" value="${set.weight}" onchange="updSet(${ei},${si},'weight',this.value)" onfocus="this.select()">`;
  h+=`<div class="w-adj"><button onclick="adjW(${ei},${si},-2.5)">−2.5</button><button onclick="adjW(${ei},${si},2.5)">+2.5</button></div>`;
  h+=`</div>`;
  h+=`<div class="inp-w"><label>${rLbl}</label>`;
  h+=`<input type="${isMyo?'text':'number'}" inputmode="${isMyo?'text':'numeric'}" placeholder="${rPh}" value="${set.reps}" onchange="updSet(${ei},${si},'reps',this.value)" onfocus="this.select()">`;
  h+=`</div></div>`;
  h+=`<button class="set-done${set.done?' checked':''}" onclick="togDone(${ei},${si},this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>`;
  if(ws[ei].sets.length>1)h+=`<button class="del-set" onclick="rmSet(${ei},${si})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>`;
  h+=`</div>`;
  return h;
}

/* ═══ SET OPERATIONS ═══ */
function updSet(ei,si,f,v){ws[ei].sets[si][f]=v;saveDraft();updateSummary();if(f==='weight')renderExs();}

function togDone(ei,si,btn){
  const wasDone=ws[ei].sets[si].done;
  ws[ei].sets[si].done=!wasDone;
  btn.classList.toggle('checked');
  saveDraft();updateSummary();
  if(!wasDone){startWT();const s=getS();if(s.autoRest)startRest();}
}

function cycleType(ei,si){
  const types=['work','warmup','drop'];
  const cur=ws[ei].sets[si].type||'work';

/* ═══ LIVE SUMMARY ═══ */
function updateSummary(){
  let vol=0,done=0,total=0,exDone=0;
  const tmpls=getT(),exs=tmpls[curT];
  exs.forEach((_,ei)=>{
    if(!ws[ei])return;
    let exHas=false;
    ws[ei].sets.forEach(s=>{total++;if(s.done)done++;const w=parseFloat(s.weight)||0;const r=parseTR(s.reps);vol+=w*r;if(w||r)exHas=true;});
    if(exHas)exDone++;
  });
  document.getElementById('sVol').textContent=vol>0?vol.toFixed(0):'0';
  document.getElementById('sSets').textContent=done+'/'+total;
  document.getElementById('sExs').textContent=exDone+'/'+exs.length;

  // Volume comparison
  const lastVol=getLastVolume();
  const cmp=document.getElementById('sVolCmp');
  if(lastVol!==null&&vol>0){
    const pct=((vol-lastVol)/lastVol*100).toFixed(0);
    if(pct>0){cmp.textContent='↑ +'+pct+'%';cmp.className='summary-cmp up';}
    else if(pct<0){cmp.textContent='↓ '+pct+'%';cmp.className='summary-cmp down';}
    else{cmp.textContent='→ 0%';cmp.className='summary-cmp';}
  }else{cmp.textContent='';}
}

function startRest(){
  const s=getS();restTotal=s.restDuration;restRemain=restTotal;

  bar.classList.add('show');bar.classList.remove('done');

  restInt=setInterval(()=>{restRemain--;updRestDisplay();if(restRemain<=0){clearInterval(restInt);restDone();}},1000);
}

function updRestDisplay(){
  const m=Math.floor(restRemain/60),s=restRemain%60;
  document.getElementById('restTime').textContent=m+':'+(s<10?'0':'')+s;
  const pct=restTotal>0?((restRemain/restTotal)*100):0;
  document.getElementById('restProgress').style.width=pct+'%';
}

function restDone(){
  const bar=document.getElementById('restBar');bar.classList.add('done');
  document.getElementById('restTime').textContent='✅ Готово!';
  document.getElementById('restProgress').style.width='100%';
  const s=getS();
  if(s.vibrate&&navigator.vibrate)navigator.vibrate([200,100,200]);

  setTimeout(()=>{bar.classList.remove('show','done');},4000);
}

function playBeep(){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    o.frequency.value=880;o.type='sine';g.gain.value=0.3;o.start();o.stop(c.currentTime+0.2);
    setTimeout(()=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.frequency.value=1100;o2.type='sine';g2.gain.value=0.3;o2.start();o2.stop(c.currentTime+0.25);},250);
  }catch(e){}
}

function setBar(w,el){
  const s=getS();s.barWeight=w;putS(s);
  document.querySelectorAll('#modBox .rest-preset').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');calcPlates();
}

function calcPlates(){
  const total=parseFloat(document.getElementById('pcWeight').value)||0;
  const bar=getS().barWeight||20;
  const res=document.getElementById('plateResult');
  if(total<=bar){res.innerHTML=total>0?`<div class="plate-side">Только гриф (${bar} кг)</div>`:'';return;}

  const perSide=(total-bar)/2;
  const avail=[25,20,15,10,5,2.5,1.25];
  const plates=[];
  let rem=perSide;
  avail.forEach(p=>{while(rem>=p-0.001){plates.push(p);rem=Math.round((rem-p)*100)/100;}});

  if(rem>0.01){res.innerHTML=`<div class="plate-side" style="color:var(--red)">Невозможно собрать точно</div>`;return;}

  // Visual
  const plateClass=w=>'plate-disc p'+String(w).replace('.','_');
  let visual='<div class="plate-visual">';
  plates.forEach(p=>{visual+=`<div class="${plateClass(p)}">${p}</div>`;});
  visual+=`<div class="plate-bar"></div>`;
  [...plates].reverse().forEach(p=>{visual+=`<div class="${plateClass(p)}">${p}</div>`;});
  visual+='</div>';

  // List
  const counts={};plates.forEach(p=>{counts[p]=(counts[p]||0)+1;});
  let list='<div class="plate-list">';
  Object.entries(counts).forEach(([p,c])=>{list+=`<div class="plate-item">${p} кг × ${c}</div>`;});
  list+='</div>';

  res.innerHTML=`<div class="plate-side">На каждую сторону: <strong>${perSide} кг</strong></div>${visual}${list}`;
}

function saveWorkout(){
  const tmpls=getT(),exs=tmpls[curT];

  exs.forEach((ex,ei)=>{

/* ═══ CONFETTI ═══ */
function launchConfetti(){
  const canvas=document.getElementById('confettiCanvas');
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const particles=[];
  const colors=['#7c6cf0','#00c48c','#ffa726','#ff6b6b','#ffee58','#b0a4ff','#4dd0e1'];
  for(let i=0;i<100;i++){
    particles.push({
      x:canvas.width/2+(Math.random()-0.5)*200,
      y:canvas.height*0.4,
      w:Math.random()*8+4,h:Math.random()*6+3,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-0.5)*12,vy:Math.random()*-14-4,
      rot:Math.random()*360,rotV:(Math.random()-0.5)*12,opacity:1
    });
  }
  let frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.35;p.rot+=p.rotV;
      p.vx*=0.99;
      if(frame>40)p.opacity-=0.015;
      if(p.opacity<=0)return;alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    frame++;
    if(alive&&frame<200)requestAnimationFrame(animate);
    else canvas.style.display='none';
  }
  requestAnimationFrame(animate);
}

function renderWeekSummary(h){
  const ws=document.getElementById('weekSummary');
  const now=new Date();
  const day=now.getDay();
  const mondayOffset=now.getDate()-day+(day===0?-6:1);
  const weekStart=new Date(now.getFullYear(),now.getMonth(),mondayOffset,0,0,0,0);

  let sessions=0,vol=0,sets=0;
  h.forEach(w=>{
    const d=new Date(w.date);
    if(d>=weekStart){
      sessions++;
      w.exercises.forEach(e=>e.sets.forEach(s=>{sets++;vol+=(parseFloat(s.weight)||0)*parseTR(s.reps);}));
    }
  });

  ws.innerHTML=`
    <div class="week-stat"><div class="week-stat-val">${sessions}</div><div class="week-stat-lbl">Эта неделя</div></div>
    <div class="week-stat"><div class="week-stat-val">${vol>0?(vol/1000).toFixed(1)+'т':'0'}</div><div class="week-stat-lbl">Объём</div></div>
    <div class="week-stat"><div class="week-stat-val">${sets}</div><div class="week-stat-lbl">Подходов</div></div>`;
}

function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data))throw 'bad';
        const h=JSON.parse(localStorage.getItem('workoutHistory')||'[]');
        const merged=[...data,...h];
        merged.sort((a,b)=>new Date(b.date)-new Date(a.date));
        localStorage.setItem('workoutHistory',JSON.stringify(merged));
        renderHistory();updateStreak();
        showToast(`📥 Импортировано ${data.length} записей`);
      }catch(e){showToast('⚠️ Ошибка формата',true);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

/* ═══ PROGRESS ═══ */
function populateProgSelect(){
  const h=JSON.parse(localStorage.getItem('workoutHistory')||'[]');
  const names=new Set();
  h.forEach(w=>w.exercises.forEach(e=>names.add(e.name)));
  const sel=document.getElementById('progSelect'),cur=sel.value;
  sel.innerHTML='<option value="">— Выберите упражнение —</option>';
  // Body weight option
  const bwLog=getBWLog();
  if(bwLog.length>1)sel.innerHTML+='<option value="__bw__">⚖️ Вес тела</option>';
  names.forEach(n=>{sel.innerHTML+=`<option value="${esc(n)}" ${n===cur?'selected':''}>${esc(n)}</option>`;});
}

function renderProgress(){
  const name=document.getElementById('progSelect').value;
  const tbody=document.getElementById('progBody');
  const canvas=document.getElementById('chartCanvas');
  const ctx=canvas.getContext('2d');
  const rm=document.getElementById('prog1rm');

  if(name==='__bw__'){renderBWProgress(canvas,ctx,tbody);rm.style.display='none';renderPRBoard();return;}

  if(!name){tbody.innerHTML='';clearCanvas(canvas,ctx);rm.style.display='none';renderPRBoard();return;}

  const h=JSON.parse(localStorage.getItem('workoutHistory')||'[]');
  const entries=[];

  h.forEach(w=>{
    w.exercises.forEach(ex=>{
      if(ex.name!==name)return;
      let mw=0,tr=0,vol=0,bestW=0,bestR=0;
      ex.sets.forEach(s=>{
        const wt=parseFloat(s.weight)||0;const rp=parseTR(s.reps);
        if(wt>mw)mw=wt;tr+=rp;vol+=wt*rp;
        if(wt>bestW||(wt===bestW&&rp>bestR)){bestW=wt;bestR=rp;}
      });
      const e1rm=bestR>0?bestW*(1+bestR/30):bestW;
      entries.push({date:new Date(w.date),maxWeight:mw,totalReps:tr,volume:vol,est1rm:Math.round(e1rm)});
    });
  });

  entries.reverse();

  if(entries.length){rm.style.display='block';document.getElementById('val1rm').textContent=entries[entries.length-1].est1rm+' кг';}
  else{rm.style.display='none';}

  let rows='';
  entries.forEach((e,i)=>{
    const ds=e.date.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
    const vt=i>0?(e.volume>entries[i-1].volume?'trend-up':e.volume<entries[i-1].volume?'trend-down':''):'';
    rows+=`<tr><td>${ds}</td><td>${e.maxWeight} кг</td><td>${e.totalReps}</td><td class="${vt}">${e.volume.toFixed(0)}</td><td>${e.est1rm}</td></tr>`;
  });
  tbody.innerHTML=rows;
  drawChart(canvas,ctx,entries.map(e=>e.volume),entries.map(e=>e.date),'Объём (кг)');
  renderPRBoard();
}

function renderBWProgress(canvas,ctx,tbody){
  const log=getBWLog();
  if(log.length<1){clearCanvas(canvas,ctx);tbody.innerHTML='';return;}
  const entries=log.map(e=>({date:new Date(e.date),weight:e.weight}));

  let rows='';
  entries.forEach((e,i)=>{
    const ds=e.date.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
    const delta=i>0?(e.weight-entries[i-1].weight).toFixed(1):'—';
    const cls=i>0?(delta>0?'trend-up':delta<0?'trend-down':''):'';
    rows+=`<tr><td>${ds}</td><td>${e.weight} кг</td><td class="${cls}">${delta!=='—'?(delta>0?'+':'')+delta:delta}</td><td></td><td></td></tr>`;
  });
  tbody.innerHTML=rows;
  drawChart(canvas,ctx,entries.map(e=>e.weight),entries.map(e=>e.date),'Вес (кг)');
}

function clearCanvas(canvas,ctx){
  const dpr=window.devicePixelRatio||1;const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  ctx.scale(dpr,dpr);ctx.clearRect(0,0,rect.width,rect.height);
}

function drawChart(canvas,ctx,values,dates,label){
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  ctx.clearRect(0,0,W,H);

  if(values.length<2){
    ctx.fillStyle='#505068';ctx.font='13px Inter,sans-serif';ctx.textAlign='center';
    ctx.fillText('Нужно минимум 2 записи',W/2,H/2);return;
  }

  const mx=Math.max(...values),mn=Math.min(...values),rng=mx-mn||1;
  const pL=10,pR=10,pT=20,pB=30,cW=W-pL-pR,cH=H-pT-pB;

  ctx.strokeStyle='rgba(42,42,58,0.6)';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=pT+(cH/4)*i;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();}

  const pts=values.map((v,i)=>({x:pL+(cW/(values.length-1))*i,y:pT+cH-((v-mn)/rng)*cH}));

  const grad=ctx.createLinearGradient(0,pT,0,H-pB);
  grad.addColorStop(0,'rgba(124,108,240,0.35)');grad.addColorStop(1,'rgba(124,108,240,0)');
  ctx.beginPath();ctx.moveTo(pts[0].x,H-pB);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-pB);ctx.closePath();ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.strokeStyle='#7c6cf0';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();

  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle='#b0a4ff';ctx.fill();
    ctx.strokeStyle='#08080d';ctx.lineWidth=2;ctx.stroke();
    if(values.length<=12){
      ctx.fillStyle='#505068';ctx.font='9px Inter,sans-serif';ctx.textAlign='center';
      const ds=dates[i].toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
      ctx.fillText(ds,p.x,H-pB+14);
    }
  });
}

/* ═══ PR BOARD ═══ */
function renderPRBoard(){
  const h=JSON.parse(localStorage.getItem('workoutHistory')||'[]');
  const board=document.getElementById('prBoard');
  if(!h.length){board.innerHTML='';return;}

  const prs={};
  h.forEach(w=>{
    w.exercises.forEach(ex=>{
      ex.sets.forEach(s=>{
        const wt=parseFloat(s.weight)||0;
        if(!prs[ex.name]||wt>prs[ex.name].weight){
          prs[ex.name]={weight:wt,date:new Date(w.date)};
        }
      });
    });
  });

  const sorted=Object.entries(prs).filter(([,v])=>v.weight>0).sort((a,b)=>b[1].date-a[1].date);
  if(!sorted.length){board.innerHTML='';return;}

  const now=Date.now();
  let html='<div class="pr-board-title">🏆 Рекорды</div><div class="pr-grid">';
  sorted.forEach(([name,data])=>{
    const daysAgo=Math.floor((now-data.date.getTime())/86400000);
    const recent=daysAgo<=7;
    const dateStr=data.date.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
    html+=`<div class="pr-card${recent?' recent':''}"><div class="pr-card-name">${esc(name)}</div><div class="pr-card-val">${data.weight} кг</div><div class="pr-card-sub">${dateStr}${recent?' 🔥':''}</div></div>`;
  });
  html+='</div>';
  board.innerHTML=html;
}

/* ═══ HELPERS ═══ */
function parseTR(v){
  if(!v)return 0;const s=String(v);
  if(s.includes('+'))return s.split('+').reduce((a,b)=>a+(parseInt(b)||0),0);
  return parseInt(s)||0;
}

/* ═══ TABS & TOAST ═══ */
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  if(id==='tabHistory')renderHistory();
  if(id==='tabProgress'){populateProgSelect();renderProgress();}
}

function showToast(msg,warn){
  const t=document.getElementById('toast');t.textContent=msg;
  t.style.background=warn?'var(--orange)':'var(--green)';t.style.color='#000';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}
