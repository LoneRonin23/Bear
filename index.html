<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Gym Log</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--card:#14141f;--card2:#1a1a2a;--border:#252540;--text:#e0e0e8;--dim:#6a6a80;--accent:#6c5ce7;--accent2:#a855f7;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--superset:#2a1a3a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;max-width:480px;margin:0 auto;padding-bottom:70px;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text)}
input{font-family:inherit;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px;text-align:center;font-size:16px;width:100%}
input:focus{outline:none;border-color:var(--accent)}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

/* Header */
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.header-btn{font-size:13px;padding:6px 14px;border-radius:20px;background:var(--card2);border:1px solid var(--border);color:var(--dim);font-weight:500}
.header-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Tab bar */
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--card);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:10px 0 8px;text-align:center;font-size:11px;color:var(--dim);font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.2s}
.tab.active{color:var(--accent2)}
.tab svg{width:22px;height:22px}

/* Home */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px 20px}
.stat{background:var(--card);border-radius:12px;padding:14px 12px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:22px;font-weight:700;color:var(--accent2)}
.stat-label{font-size:11px;color:var(--dim);margin-top:4px}

.start-btn{display:block;margin:10px 20px;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:16px;font-weight:700;border-radius:14px;text-align:center;width:calc(100% - 40px);letter-spacing:0.3px}
.start-btn:active{opacity:.85;transform:scale(.98)}

.section-title{padding:20px 20px 10px;font-size:13px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px}

/* Exercise list (home preview) */
.ex-preview{margin:0 20px 8px;background:var(--card);border-radius:10px;padding:12px 14px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ex-preview.superset{border-left:3px solid var(--accent2);background:var(--superset)}
.ex-preview .name{font-size:14px;font-weight:500}
.ex-preview .meta{font-size:12px;color:var(--dim)}

/* Workout screen */
.progress-bar{margin:0 20px 16px;height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}

.exercise{margin:0 20px 10px;background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.exercise.superset{border-left:3px solid var(--accent2);background:var(--superset)}
.exercise.done{opacity:.6}
.ex-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.ex-header .title{font-size:14px;font-weight:600}
.ex-header .badge{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--card2);color:var(--dim)}
.ex-header .badge.complete{background:var(--green);color:#fff}
.ex-header .chevron{color:var(--dim);transition:transform .2s;font-size:18px}
.ex-header .chevron.open{transform:rotate(180deg)}

.ex-body{padding:0 16px 14px;display:none}
.ex-body.open{display:block}

.prev-data{font-size:11px;color:var(--dim);margin-bottom:10px;padding:6px 10px;background:var(--card2);border-radius:6px}
.prev-data span{color:var(--accent2)}

.set-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.set-num{width:28px;height:28px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--dim);flex-shrink:0}
.set-inputs{display:flex;gap:6px;flex:1}
.set-inputs input{padding:8px 4px;font-size:15px}
.set-inputs .lbl{font-size:10px;color:var(--dim);text-align:center;margin-top:2px}
.set-check{width:36px;height:36px;border-radius:10px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:.2s}
.set-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.set-check:active{transform:scale(.9)}

.finish-btn{display:block;margin:20px;padding:16px;background:var(--green);color:#fff;font-size:16px;font-weight:700;border-radius:14px;text-align:center;width:calc(100% - 40px)}
.finish-btn:disabled{opacity:.4}
.cancel-btn{display:block;margin:0 20px 20px;padding:12px;color:var(--red);font-size:14px;text-align:center;width:calc(100% - 40px)}

/* History */
.hist-item{margin:0 20px 10px;background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.hist-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hist-date{font-size:14px;font-weight:600}
.hist-stats{font-size:12px;color:var(--dim)}
.hist-body{display:none;padding:0 16px 12px}
.hist-body.open{display:block}
.hist-ex{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.hist-ex:last-child{border:none}
.hist-ex .hname{font-weight:500;margin-bottom:4px}
.hist-ex .hsets{color:var(--dim);font-size:12px}
.hist-del{padding:8px 14px;font-size:12px;color:var(--red);border:1px solid var(--red);border-radius:8px;opacity:.7}
.hist-del:active{opacity:1}

.empty{text-align:center;padding:60px 20px;color:var(--dim);font-size:14px}

/* Timer */
.timer-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;z-index:200;display:none}
.timer-bar.show{display:flex}
.timer-bar .time{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent2)}
.timer-bar button{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600}
.timer-bar .skip{color:var(--dim)}
</style>
</head>
<body>

<div class="timer-bar" id="timerBar">
  <span>⏱ Отдых</span>
  <span class="time" id="timerDisplay">0:00</span>
  <button class="skip" onclick="stopTimer()">Пропустить</button>
</div>

<div class="header">
  <h1>🏋️ Gym Log</h1>
  <button class="header-btn" id="timerBtn" onclick="startRestTimer()">⏱ 1:30</button>
</div>

<div id="pageHome" class="page"></div>
<div id="pageWorkout" class="page" style="display:none"></div>
<div id="pageHistory" class="page" style="display:none"></div>

<nav class="tabs">
  <button class="tab active" onclick="showPage('home')" id="tabHome">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Главная
  </button>
  <button class="tab" onclick="showPage('workout')" id="tabWorkout">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M4 8h4M16 8h4M4 16h4M16 16h4M8 8h8M8 16h8"/></svg>
    Тренировка
  </button>
  <button class="tab" onclick="showPage('history')" id="tabHistory">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    История
  </button>
</nav>

<script>
// ─── Data ───
const EXERCISES = [
  {id:'hammer_press',name:'Жим в Хаммере под углом',sets:3,reps:'8-12',type:'normal'},
  {id:'lat_pull',name:'Тяга вертикального блока',sets:3,reps:'8-12',type:'normal'},
  {id:'cable_row',name:'Тяга горизонтальной рукоятки',sets:3,reps:'10-12',type:'normal'},
  {id:'lat_raise',name:'Разводка на среднюю дельту',sets:3,reps:'12-15',type:'normal'},
  {id:'tricep_cable',name:'Трицепс (блок)',sets:3,reps:'10-12',type:'superset',superLabel:'СУПЕРСЕТ'},
  {id:'hammer_curl',name:'Молотки (гантели)',sets:3,reps:'10-12',type:'superset'},
  {id:'leg_press',name:'Жим ногами',sets:2,reps:'10-15',type:'normal'},
  {id:'leg_curl',name:'Сгибания на бицепс бедра',sets:2,reps:'12-15',type:'normal'},
  {id:'calves',name:'Икры',sets:3,reps:'15-20',type:'normal'},
  {id:'forearms',name:'Предплечья',sets:2,reps:'15-20',type:'normal'},
];

function loadData(){try{return JSON.parse(localStorage.getItem('gymlog'))||{history:[],current:null}}catch(e){return{history:[],current:null}}}
function saveData(d){localStorage.setItem('gymlog',JSON.stringify(d))}

let data = loadData();
let openExercises = {};
let openHistory = {};
let timerInterval = null;
let timerSeconds = 0;

// ─── Pages ───
function showPage(p){
  document.getElementById('pageHome').style.display = p==='home'?'block':'none';
  document.getElementById('pageWorkout').style.display = p==='workout'?'block':'none';
  document.getElementById('pageHistory').style.display = p==='history'?'block':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');
  if(p==='home') renderHome();
  if(p==='workout') renderWorkout();
  if(p==='history') renderHistory();
}

// ─── Home ───
function renderHome(){
  const d = data;
  const total = d.history.length;
  const last = total ? formatDate(d.history[0].date) : '—';
  
  // streak
  let streak = 0;
  if(total){
    const today = new Date(); today.setHours(0,0,0,0);
    for(let i=0;i<d.history.length;i++){
      const hd = new Date(d.history[i].date); hd.setHours(0,0,0,0);
      const diff = Math.floor((today - hd)/(86400000));
      if(diff <= streak + 7) streak++; else break;
    }
  }

  let html = `
    <div class="stats">
      <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Тренировок</div></div>
      <div class="stat"><div class="stat-val">${streak}</div><div class="stat-label">Серия</div></div>
      <div class="stat"><div class="stat-val" style="font-size:14px">${last}</div><div class="stat-label">Последняя</div></div>
    </div>
    <button class="start-btn" onclick="${d.current?'showPage(\"workout\")':'startWorkout()'}">
      ${d.current?'▶ Продолжить тренировку':'＋ Начать тренировку'}
    </button>
    <div class="section-title">Программа</div>
  `;
  
  EXERCISES.forEach(ex=>{
    const ss = ex.type==='superset'?' superset':'';
    const label = ex.superLabel?`<span style="color:var(--accent2);font-size:11px">${ex.superLabel}</span><br>`:'';
    html += `<div class="ex-preview${ss}">
      <div><div class="name">${label}${ex.name}</div></div>
      <div class="meta">${ex.sets}×${ex.reps}</div>
    </div>`;
  });
  
  document.getElementById('pageHome').innerHTML = html;
}

// ─── Workout ───
function startWorkout(){
  const prev = data.history[0];
  const sets = {};
  EXERCISES.forEach(ex=>{
    sets[ex.id] = [];
    for(let i=0;i<ex.sets;i++){
      let w='', r='';
      if(prev && prev.sets[ex.id] && prev.sets[ex.id][i]){
        w = prev.sets[ex.id][i].weight;
        r = prev.sets[ex.id][i].reps;
      }
      sets[ex.id].push({weight:w, reps:r, done:false});
    }
  });
  data.current = {date: new Date().toISOString(), sets};
  saveData(data);
  showPage('workout');
}

function renderWorkout(){
  if(!data.current){
    document.getElementById('pageWorkout').innerHTML = `
      <div class="empty">Нет активной тренировки<br><br>
      <button class="start-btn" onclick="startWorkout()" style="display:inline-block;width:auto;padding:14px 32px">＋ Начать</button></div>`;
    return;
  }
  
  const c = data.current;
  let totalSets=0, doneSets=0;
  EXERCISES.forEach(ex=>{
    c.sets[ex.id].forEach(s=>{totalSets++;if(s.done)doneSets++});
  });
  const pct = totalSets?Math.round(doneSets/totalSets*100):0;
  
  const prev = data.history[0];
  
  let html = `
    <div style="padding:12px 20px 4px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:var(--dim)">${formatDate(c.date)}</span>
      <span style="font-size:13px;font-weight:600;color:var(--accent2)">${doneSets}/${totalSets} подходов</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  `;
  
  EXERCISES.forEach(ex=>{
    const isOpen = openExercises[ex.id];
    const allDone = c.sets[ex.id].every(s=>s.done);
    const someDone = c.sets[ex.id].some(s=>s.done);
    const ss = ex.type==='superset'?' superset':'';
    const doneClass = allDone?' done':'';
    const badgeClass = allDone?' complete':'';
    const label = ex.superLabel?`<span style="color:var(--accent2);font-size:10px;font-weight:700">${ex.superLabel}</span> `:'';
    const doneCount = c.sets[ex.id].filter(s=>s.done).length;
    
    html += `<div class="exercise${ss}${doneClass}">
      <div class="ex-header" onclick="toggleEx('${ex.id}')">
        <div>
          <div class="title">${label}${ex.name}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="badge${badgeClass}">${allDone?'✓':doneCount+'/'+ex.sets}</span>
          <span class="chevron${isOpen?' open':''}">▾</span>
        </div>
      </div>
      <div class="ex-body${isOpen?' open':''}">`;
    
    // Previous data
    if(prev && prev.sets[ex.id]){
      const ps = prev.sets[ex.id].filter(s=>s.done||s.weight);
      if(ps.length){
        html += `<div class="prev-data">Прошлый раз: <span>${ps.map(s=>s.weight+'кг×'+s.reps).join(', ')}</span></div>`;
      }
    }
    
    // Set headers
    html += `<div class="set-row" style="margin-bottom:4px">
      <div class="set-num" style="background:none"></div>
      <div class="set-inputs">
        <div style="flex:1;text-align:center;font-size:10px;color:var(--dim)">Вес (кг)</div>
        <div style="flex:1;text-align:center;font-size:10px;color:var(--dim)">Повтор</div>
      </div>
      <div style="width:36px"></div>
    </div>`;
    
    c.sets[ex.id].forEach((s,i)=>{
      html += `<div class="set-row">
        <div class="set-num">${i+1}</div>
        <div class="set-inputs">
          <input type="number" inputmode="decimal" placeholder="${ex.reps}" value="${s.weight}" 
            onchange="updateSet('${ex.id}',${i},'weight',this.value)" ${s.done?'style="opacity:.5"':''}>
          <input type="number" inputmode="numeric" placeholder="${ex.reps}" value="${s.reps}" 
            onchange="updateSet('${ex.id}',${i},'reps',this.value)" ${s.done?'style="opacity:.5"':''}>
        </div>
        <button class="set-check${s.done?' checked':''}" onclick="toggleSet('${ex.id}',${i})">✓</button>
      </div>`;
    });
    
    html += `</div></div>`;
  });
  
  html += `<button class="finish-btn" onclick="finishWorkout()" ${doneSets===0?'disabled':''}>
    ✓ Завершить тренировку
  </button>
  <button class="cancel-btn" onclick="cancelWorkout()">Отменить</button>`;
  
  document.getElementById('pageWorkout').innerHTML = html;
}

function toggleEx(id){openExercises[id]=!openExercises[id];renderWorkout()}

function updateSet(exId,i,field,val){
  data.current.sets[exId][i][field]=val;
  saveData(data);
}

function toggleSet(exId,i){
  const s = data.current.sets[exId][i];
  s.done = !s.done;
  saveData(data);
  if(s.done) startRestTimer();
  renderWorkout();
}

function finishWorkout(){
  if(!confirm('Завершить тренировку?')) return;
  data.history.unshift({...data.current});
  data.current = null;
  saveData(data);
  showPage('home');
}

function cancelWorkout(){
  if(!confirm('Отменить тренировку? Данные будут потеряны.')) return;
  data.current = null;
  saveData(data);
  showPage('home');
}

// ─── Timer ───
function startRestTimer(){
  stopTimer();
  timerSeconds = 90;
  document.getElementById('timerBar').classList.add('show');
  document.body.style.paddingTop = '50px';
  updateTimerDisplay();
  timerInterval = setInterval(()=>{
    timerSeconds--;
    if(timerSeconds<=0){stopTimer();if(navigator.vibrate)navigator.vibrate(300)}
    else updateTimerDisplay();
  },1000);
}

function stopTimer(){
  clearInterval(timerInterval);
  timerInterval=null;
  document.getElementById('timerBar').classList.remove('show');
  document.body.style.paddingTop='0';
}

function updateTimerDisplay(){
  const m=Math.floor(timerSeconds/60);
  const s=timerSeconds%60;
  document.getElementById('timerDisplay').textContent=m+':'+(s<10?'0':'')+s;
}

// ─── History ───
function renderHistory(){
  if(!data.history.length){
    document.getElementById('pageHistory').innerHTML='<div class="empty">Пока нет записей.<br>Начни первую тренировку!</div>';
    return;
  }
  let html='<div class="section-title">Все тренировки</div>';
  data.history.forEach((w,wi)=>{
    const isOpen = openHistory[wi];
    let totalSets=0, totalVol=0;
    EXERCISES.forEach(ex=>{
      if(w.sets[ex.id]) w.sets[ex.id].forEach(s=>{
        if(s.done){totalSets++;totalVol+=((parseFloat(s.weight)||0)*(parseInt(s.reps)||0))}
      });
    });
    
    html+=`<div class="hist-item">
      <div class="hist-header" onclick="toggleHist(${wi})">
        <div>
          <div class="hist-date">${formatDate(w.date)}</div>
          <div class="hist-stats">${totalSets} подходов · ${Math.round(totalVol).toLocaleString()} кг объём</div>
        </div>
        <span class="chevron${isOpen?' open':''}">▾</span>
      </div>
      <div class="hist-body${isOpen?' open':''}">`;
    
    EXERCISES.forEach(ex=>{
      if(!w.sets[ex.id]) return;
      const done = w.sets[ex.id].filter(s=>s.done);
      if(!done.length) return;
      html+=`<div class="hist-ex">
        <div class="hname">${ex.name}</div>
        <div class="hsets">${done.map(s=>s.weight+'кг × '+s.reps).join(' → ')}</div>
      </div>`;
    });
    
    html+=`<div style="text-align:right;padding:8px 0 4px">
      <button class="hist-del" onclick="deleteHist(${wi})">Удалить</button>
    </div></div></div>`;
  });
  
  document.getElementById('pageHistory').innerHTML=html;
}

function toggleHist(i){openHistory[i]=!openHistory[i];renderHistory()}

function deleteHist(i){
  if(!confirm('Удалить эту тренировку?'))return;
  data.history.splice(i,1);
  openHistory={};
  saveData(data);
  renderHistory();
}

// ─── Utils ───
function formatDate(d){
  const dt=new Date(d);
  const day=dt.getDate();
  const months=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return day+' '+months[dt.getMonth()];
}

// ─── Init ───
showPage(data.current?'workout':'home');
</script>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
